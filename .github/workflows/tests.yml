name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - name: Sync status to UnitTCMS
        if: always()
        env:
          UNITTCMS_URL: ${{ secrets.UNITTCMS_URL }}
          UNITTCMS_TOKEN: ${{ secrets.UNITTCMS_TOKEN }}
          UNITTCMS_PROJECT_ID: ${{ secrets.UNITTCMS_PROJECT_ID }}
        run: npm run sync
